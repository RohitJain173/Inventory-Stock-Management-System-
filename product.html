<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="index.html">Inventory System</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'home' %}active fw-bold text-warning{% endif %}" href="{{ url_for('home') }}">Home</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'product' %}active fw-bold text-warning{% endif %}" href="{{ url_for('product') }}">Products</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'customer' %}active fw-bold text-warning{% endif %}" href="{{ url_for('customer') }}">Customers</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'stockinout' %}active fw-bold text-warning{% endif %}" href="{{ url_for('stockinout') }}">Stock</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'report' %}active fw-bold text-warning{% endif %}" href="{{ url_for('report') }}">Reports</a></li>
      </ul>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="mb-4">Product Management</h2>

    <!-- Filter Dropdown -->
    <div class="mb-3">
      <label for="categoryFilter" class="form-label">Filter by Category</label>
      <select class="form-select w-auto d-inline-block" id="categoryFilter">
        <option value="All">All</option>
        <option>Electronics</option>
        <option>Grocery</option>
        <option>Clothing</option>
        <option>Stationery</option>
      </select>
    </div>

    <!-- Add Product Form -->
    <div class="card mb-4">
      <div class="card-header bg-primary text-white">Add / Edit Product</div>
      <div class="card-body">
        <form id="productForm">
          <div class="row g-3">
            <div class="col-md-4">
              <label for="productName" class="form-label">Product Name</label>
              <input type="text" class="form-control" id="productName" required>
            </div>
            <div class="col-md-4">
              <label for="sku" class="form-label">SKU</label>
              <input type="text" class="form-control" id="sku" required>
            </div>
            <div class="col-md-4">
              <label for="category" class="form-label">Category</label>
              <select class="form-select" id="category" required>
                <option selected disabled value="">Choose...</option>
                <option>Electronics</option>
                <option>Grocery</option>
                <option>Clothing</option>
                <option>Stationery</option>
              </select>
            </div>
            <div class="col-md-3">
              <label for="price" class="form-label">Price (INR)</label>
              <input type="number" class="form-control" id="price" required>
            </div>
            <div class="col-md-3">
              <label for="stock" class="form-label">Stock Quantity</label>
              <input type="number" class="form-control" id="stock" required>
            </div>
            <div class="col-md-6 d-flex align-items-end">
              <button type="submit" class="btn btn-success me-2">Save Product</button>
              <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Product Table -->
    <div class="card">
      <div class="card-header bg-success text-white">Product List</div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-bordered table-hover" id="productTable">
            <thead class="table-dark">
              <tr>
                <th>Name</th>
                <th>SKU</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Product rows will be populated by JavaScript -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <footer class="text-center p-3 bg-dark text-light mt-4">
    &copy; 2025 Inventory & Stock Management System
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const tableBody = document.querySelector("#productTable tbody");
    let editMode = false;
    let editingId = null;

    function loadProducts() {
      fetch('/get_products')
        .then(res => res.json())
        .then(data => {
          tableBody.innerHTML = '';
          const selectedCategory = document.getElementById("categoryFilter").value;

          data.products.forEach(p => {
            if (selectedCategory !== "All" && p.category !== selectedCategory) return;

            const unitPrice = p.stock_level > 0 ? (p.stock_value / p.stock_level).toFixed(2) : 0;
            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${p.product_name}</td>
              <td>${p.SKU}</td>
              <td>${p.category}</td>
              <td>₹${unitPrice}</td>
              <td>${p.stock_level}</td>
              <td><span class="badge bg-${p.stock_level < 5 ? 'danger' : 'success'}">${p.stock_level < 5 ? 'Low' : 'OK'}</span></td>
              <td>
                <button class="btn btn-sm btn-primary" onclick="editProduct(${p.id})">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
              </td>
            `;
            tableBody.appendChild(row);
          });
        });
    }

    loadProducts();

    document.getElementById("categoryFilter").addEventListener("change", loadProducts);

    document.getElementById("productForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const data = {
        product_name: document.getElementById("productName").value,
        SKU: document.getElementById("sku").value,
        category: document.getElementById("category").value,
        stock_level: parseInt(document.getElementById("stock").value),
        stock_value: parseFloat(document.getElementById("price").value) * parseInt(document.getElementById("stock").value)
      };

      const url = editMode ? `/update_product/${editingId}` : '/add_product';

      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(response => {
        alert(response.message);
        document.getElementById("productForm").reset();
        editMode = false;
        editingId = null;
        loadProducts();
      })
      .catch(error => alert("Operation failed."));
    });

    function editProduct(id) {
      fetch(`/get_products`)
        .then(res => res.json())
        .then(data => {
          const product = data.products.find(p => p.id === id);
          document.getElementById("productName").value = product.product_name;
          document.getElementById("sku").value = product.SKU;
          document.getElementById("category").value = product.category;
          document.getElementById("price").value = (product.stock_value / product.stock_level).toFixed(2);
          document.getElementById("stock").value = product.stock_level;

          editMode = true;
          editingId = id;
        });
    }

    function deleteProduct(id) {
      fetch(`/delete_product/${id}`, {
        method: 'POST'
      })
      .then(res => res.json())
      .then(response => {
        alert(response.message);
        loadProducts();
      });
    }
  </script>
</body>
</html>
