<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    .btn-bold {
      font-weight: bold;
    }
    .nav-link {
      font-weight: normal;
    }
    .nav-item.active .nav-link {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="index.html">Inventory System</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'home' %}active fw-bold text-warning{% endif %}" href="{{ url_for('home') }}">Home</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'product' %}active fw-bold text-warning{% endif %}" href="{{ url_for('product') }}">Products</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'customer' %}active fw-bold text-warning{% endif %}" href="{{ url_for('customer') }}">Customers</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'stockinout' %}active fw-bold text-warning{% endif %}" href="{{ url_for('stockinout') }}">Stock</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'report' %}active fw-bold text-warning{% endif %}" href="{{ url_for('report') }}">Reports</a></li>
      </ul>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="mb-4">Customer Management</h2>

    <!-- Customer Form -->
    <div class="card mb-4">
      <div class="card-header bg-primary text-white">Add / Edit Customer</div>
      <div class="card-body">
        <form id="customerForm">
          <div class="row g-3">
            <div class="col-md-4">
              <label for="customerId" class="form-label">Customer ID (Unique)</label>
              <input type="text" class="form-control" id="customerId" required />
            </div>
            <div class="col-md-4">
              <label for="customerName" class="form-label">Name</label>
              <input type="text" class="form-control" id="customerName" required />
            </div>
            <div class="col-md-4">
              <label for="mobile" class="form-label">Mobile</label>
              <input type="text" class="form-control" id="mobile" required />
            </div>
            <div class="col-md-12">
              <label for="address" class="form-label">Address</label>
              <input type="text" class="form-control" id="address" required />
            </div>
            <div class="col-md-6 d-flex align-items-end">
              <button type="submit" class="btn btn-success me-2">Add Customer</button>
              <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Customer List Table -->
    <div class="card mb-4">
      <div class="card-header bg-warning text-dark">Customer List</div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-bordered table-hover" id="customerTable">
            <thead class="table-dark">
              <tr>
                <th>Customer ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Address</th>
              </tr>
            </thead>
            <tbody>
              <!-- Customer rows will load here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center p-3 bg-dark text-light mt-4">
    &copy; 2025 Inventory & Stock Management System
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>
    $(document).ready(function () {
      // Load customers
      $.get('/get_customers', function (data) {
        $('#customerTable tbody').empty();
        data.customers.forEach(function (customer) {
          $('#customerTable tbody').append(`
            <tr>
              <td>${customer.customer_id}</td>
              <td>${customer.customer_name}</td>
              <td>${customer.phone}</td>
              <td>${customer.address}</td>
            </tr>
          `);
        });
      });

      // Add customer
      $('#customerForm').submit(function (event) {
        event.preventDefault();

        const customerId = $('#customerId').val();

        // Validate unique Customer ID on the client side
        $.get('/get_customers', function (data) {
          let customerExists = data.customers.some(function (customer) {
            return customer.customer_id === customerId;
          });

          if (customerExists) {
            alert('Customer ID already exists. Please choose a unique ID.');
            return;
          }

          const dataToSubmit = {
            customer_id: customerId,
            customer_name: $('#customerName').val(),
            phone: $('#mobile').val(),
            address: $('#address').val(),
          };

          $.ajax({
            url: '/add_customer',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(dataToSubmit),
            success: function (res) {
              alert(res.message);
              location.reload();
            }
          });
        });
      });

      // Clear the form after reset
      $('#customerForm').on('reset', function () {
        $('#customerId').val('');
      });
    });
  </script>
</body>
</html>
